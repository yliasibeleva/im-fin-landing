<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сибилева Юлия Николаевна — Эксперт финансового учёта</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a0000;
    --card: #2d0000;
    --border: rgba(180,150,80,0.18);
    --gold: #c9a84c;
    --gold2: #f0d080;
    --gold3: #7a5c1e;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #c9a84c;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', 'Times New Roman', serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 16px;
    overflow-x: hidden;
  }

  /* --- Particles --- */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* --- Card --- */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 56px 48px 48px;
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.07),
      0 24px 80px rgba(0,0,0,0.7),
      0 0 60px rgba(201,168,76,0.04);
    animation: cardIn 0.9s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(32px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Gold top line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius: 2px;
  }

  /* --- Avatar --- */
  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 28px;
  }
  .avatar-ring {
    width: 108px; height: 108px;
    border-radius: 50%;
    background: conic-gradient(var(--gold), var(--gold2), var(--gold3), var(--gold));
    padding: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: spinRing 8s linear infinite;
    box-shadow: 0 0 32px rgba(201,168,76,0.25);
  }
  @keyframes spinRing {
    to { filter: hue-rotate(30deg); }
  }
  .avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #16161a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .avatar-initials {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    user-select: none;
  }
  .status-dot {
    position: absolute;
    bottom: 4px; right: 4px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #2ecc71;
    border: 3px solid var(--card);
    box-shadow: 0 0 8px rgba(46,204,113,0.6);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(46,204,113,0.6); }
    50%       { box-shadow: 0 0 18px rgba(46,204,113,0.9); }
  }

  /* --- Name --- */
  .name {
    font-size: clamp(1.45rem, 5vw, 2rem);
    font-weight: 700;
    letter-spacing: 0.5px;
    line-height: 1.25;
    background: linear-gradient(135deg, #d4a843 0%, #f5e08a 45%, #c9a84c 70%, #f0d080 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 18px rgba(201,168,76,0.45));
    animation: glowPulse 3s ease-in-out infinite;
    margin-bottom: 8px;
  }
  @keyframes glowPulse {
    0%, 100% { filter: drop-shadow(0 0 14px rgba(201,168,76,0.4)); }
    50%       { filter: drop-shadow(0 0 28px rgba(201,168,76,0.75)); }
  }

  /* --- Divider --- */
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto;
  }

  /* --- Specialization --- */
  .spec {
    font-size: clamp(0.85rem, 3vw, 1rem);
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: 'Arial', sans-serif;
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .spec span {
    color: rgba(201,168,76,0.75);
  }

  /* --- Tags --- */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 20px 0 32px;
  }
  .tag {
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 0.72rem;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(201,168,76,0.05);
    font-family: 'Arial', sans-serif;
    transition: all 0.3s;
  }
  .tag:hover {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.2);
  }

  /* --- Social icons --- */
  .socials {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 32px;
  }
  .social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 50px; height: 50px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    text-decoration: none;
    transition: all 0.3s cubic-bezier(.22,1,.36,1);
    position: relative;
    overflow: hidden;
  }
  .social-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: inherit;
  }
  .social-btn svg {
    position: relative;
    z-index: 1;
    transition: transform 0.3s, color 0.3s;
    fill: currentColor;
  }
  .social-btn:hover {
    border-color: var(--gold);
    color: var(--bg);
    transform: translateY(-4px) scale(1.08);
    box-shadow: 0 12px 30px rgba(201,168,76,0.3);
  }
  .social-btn:hover::before { opacity: 1; }
  .social-btn:hover svg { transform: scale(1.15); }

  /* Tooltip */
  .social-btn[data-tip]::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: rgba(30,30,30,0.95);
    color: var(--gold2);
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
    border: 1px solid var(--border);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    font-family: 'Arial', sans-serif;
  }
  .social-btn:hover::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* --- Phone --- */
  .phone-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .phone-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--gold2);
    text-decoration: none;
    font-family: 'Arial', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 8px 20px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 10px;
    background: rgba(201,168,76,0.06);
    transition: all 0.3s;
  }
  .phone-link:hover {
    background: rgba(201,168,76,0.14);
    border-color: var(--gold);
    box-shadow: 0 0 18px rgba(201,168,76,0.2);
    transform: translateY(-2px);
  }
  .phone-link svg { fill: var(--gold); flex-shrink: 0; }

  /* --- CTA Button --- */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 40px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--gold3), var(--gold), var(--gold2));
    background-size: 200% 200%;
    color: #0a0a0a;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Arial', sans-serif;
    letter-spacing: 0.5px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.4s cubic-bezier(.22,1,.36,1);
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    animation: bgShift 4s ease infinite;
  }
  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    50%       { background-position: 100% 50%; }
  }
  .cta::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.3s;
  }
  .cta:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 12px 40px rgba(201,168,76,0.5);
  }
  .cta:hover::after { background: rgba(255,255,255,0.1); }
  .cta:active { transform: scale(0.98); }
  .cta svg { position: relative; z-index: 1; fill: currentColor; }
  .cta span { position: relative; z-index: 1; }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transform: scale(0);
    animation: rippleAnim 0.6s linear;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  /* --- Footer --- */
  .footer {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 0.72rem;
    color: rgba(136,136,136,0.5);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Arial', sans-serif;
  }



  /* --- Brand Logo --- */
  .brand-logo {
    width: 220px;
    height: auto;
    margin: 0 auto 28px;
    display: block;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  }
  /* --- Responsive --- */
  @media (max-width: 480px) {
    .card { padding: 40px 24px 36px; }
    .cta { padding: 14px 28px; font-size: 0.9rem; }
  }
</style>
</head>

<script>
  /* --- Particles --- */
  (function() {
    const container = document.getElementById('particles');
    const count = 28;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        animation-duration:${8 + Math.random()*14}s;
        animation-delay:${Math.random()*12}s;
        opacity:0;
      `;
      container.appendChild(p);
    }
  })();

  /* --- CTA Ripple --- */
  document.getElementById('ctaBtn').addEventListener('click', function(e) {
    const btn = this;
    const rect = btn.getBoundingClientRect();
    const rip = document.createElement('span');
    rip.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    rip.style.cssText = `
      width:${size}px; height:${size}px;
      left:${e.clientX - rect.left - size/2}px;
      top:${e.clientY - rect.top - size/2}px;
    `;
    btn.appendChild(rip);
    setTimeout(() => rip.remove(), 700);
  });

  /* --- Card tilt on mouse move --- */
  const card = document.querySelector('.card');
  document.addEventListener('mousemove', function(e) {
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) / (window.innerWidth / 2);
    const dy = (e.clientY - cy) / (window.innerHeight / 2);
    const rx = -dy * 6;
    const ry = dx * 6;
    card.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg)`;
  });
  document.addEventListener('mouseleave', function() {
    card.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
    card.style.transition = 'transform 0.6s cubic-bezier(.22,1,.36,1)';
  });
  document.addEventListener('mousemove', function() {
    card.style.transition = 'transform 0.08s linear';
  });

  /* --- Touch tilt for mobile --- */
  document.addEventListener('touchmove', function(e) {
    const t = e.touches[0];
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (t.clientX - cx) / (window.innerWidth / 2);
    const dy = (t.clientY - cy) / (window.innerHeight / 2);
    card.style.transform = `perspective(900px) rotateX(${-dy*4}deg) rotateY(${dx*4}deg)`;
    card.style.transition = 'transform 0.1s linear';
  }, {passive:true});
  document.addEventListener('touchend', function() {
    card.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
    card.style.transition = 'transform 0.6s cubic-bezier(.22,1,.36,1)';
  });
</script>
